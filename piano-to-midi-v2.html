<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piano → MIDI Converter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0a0a0c;
  --surface:  #111115;
  --surface2: #16161c;
  --border:   #1e1e26;
  --border-hi:#2e2e3e;
  --text:     #d8d8e8;
  --muted:    #555568;
  --accent:   #c8a96e;
  --accent2:  #7e6bb0;
  --danger:   #c06070;
  --success:  #6baa8a;
  --glow:     rgba(200,169,110,0.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body {
  background:var(--bg);color:var(--text);
  font-family:'DM Mono',monospace;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:2rem 1rem 4rem;
  overflow-x:hidden;
}
body::before {
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:40px 40px;opacity:.35;pointer-events:none;z-index:0;
}
.wrap{position:relative;z-index:1;width:100%;max-width:920px;display:flex;flex-direction:column;gap:0}

/* HEADER */
header{margin-bottom:2rem;display:flex;align-items:baseline;gap:.7rem}
.logo-mark{font-family:'Cormorant Garamond',serif;font-weight:300;font-style:italic;font-size:2.4rem;color:var(--accent);line-height:1}
.logo-sub{display:flex;flex-direction:column;gap:.15rem}
.logo-title{font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
.tagline{font-size:.56rem;color:var(--muted);font-style:italic;opacity:.65}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);padding:1.8rem;position:relative}
.card::before{content:'';position:absolute;top:-1px;left:2rem;right:2rem;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.55}

/* TOP GRID */
.top-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
@media(max-width:600px){.top-grid{grid-template-columns:1fr}}

/* DROP ZONE */
#drop-zone{
  border:1px dashed var(--border-hi);padding:2rem 1.5rem;
  text-align:center;cursor:pointer;
  transition:border-color .2s,background .2s;
  position:relative;user-select:none;
  display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:140px;
}
#drop-zone:hover,#drop-zone.drag-over{border-color:var(--accent);background:var(--glow)}
#drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.drop-icon{width:26px;height:26px;margin-bottom:.8rem;opacity:.4;color:var(--accent)}
.drop-label{font-size:.67rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);line-height:1.9}
.drop-label strong{color:var(--accent);font-weight:400}
.drop-formats{margin-top:.5rem;font-size:.54rem;color:var(--muted);opacity:.55;letter-spacing:.08em}

/* FILE META BOX */
.file-meta-box{display:none;flex-direction:column;justify-content:center;gap:.7rem;padding:1rem;background:rgba(200,169,110,.04);border:1px solid rgba(200,169,110,.12)}
.file-row{display:flex;align-items:center;gap:.6rem;font-size:.64rem}
.file-row svg{color:var(--accent);opacity:.7;flex-shrink:0}
.fname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fsize{color:var(--muted)}

#convert-btn{
  margin-top:1rem;width:100%;padding:.8rem;
  background:var(--accent);color:#0a0a0c;border:none;
  font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;
  cursor:pointer;font-weight:500;transition:opacity .2s;display:none;
}
#convert-btn:hover{opacity:.88}
#convert-btn:disabled{opacity:.3;cursor:not-allowed}

/* STATUS */
#status-panel{display:none;margin-top:1.2rem;padding:1.1rem;background:rgba(126,107,176,.06);border:1px solid rgba(126,107,176,.18)}
.status-hdr{display:flex;align-items:center;gap:.6rem;margin-bottom:.7rem}
.spinner{width:12px;height:12px;border:1.5px solid rgba(126,107,176,.25);border-top-color:var(--accent2);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.status-lbl{font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--accent2)}
.prog-track{height:2px;background:var(--border);position:relative;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));width:0%;transition:width .4s ease}
.prog-shimmer{position:absolute;inset:0;width:60%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);animation:shim 1.4s ease-in-out infinite}
@keyframes shim{0%{transform:translateX(-100%)}100%{transform:translateX(250%)}}
#stage-log{margin-top:.7rem;display:flex;flex-direction:column;gap:.25rem}
.se{display:flex;align-items:center;gap:.5rem;font-size:.58rem;color:var(--muted);letter-spacing:.05em;opacity:0;transform:translateY(3px);transition:opacity .3s,transform .3s}
.se.vis{opacity:1;transform:none}
.se.active{color:var(--text)}
.se.done{color:var(--success)}
.se.err{color:var(--danger)}
.sdot{width:4px;height:4px;border-radius:50%;background:currentColor;flex-shrink:0}

/* ERROR */
#error-panel{display:none;margin-top:1rem;padding:.9rem 1rem;background:rgba(192,96,112,.07);border:1px solid rgba(192,96,112,.22);font-size:.62rem;color:var(--danger);letter-spacing:.05em;line-height:1.8}

/* ═══════════ PIANO ROLL SECTION ═══════════ */
#roll-section{display:none;margin-top:1.5rem;border:1px solid var(--border);background:var(--surface);position:relative}
#roll-section::before{content:'';position:absolute;top:-1px;left:2rem;right:2rem;height:1px;background:linear-gradient(90deg,transparent,var(--accent2),transparent);opacity:.5}

.roll-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.5rem .8rem;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:.6rem}
.roll-title{font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
.roll-stats{display:flex;gap:1.4rem}
.stat{display:flex;flex-direction:column;align-items:flex-end;gap:.08rem}
.stat-val{font-size:.82rem;color:var(--text)}
.stat-key{font-size:.48rem;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}

/* PLAYBACK BAR */
.playback-bar{display:flex;align-items:center;gap:.8rem;padding:.8rem 1.5rem;border-bottom:1px solid var(--border);flex-wrap:wrap}
.pb-group{display:flex;align-items:center;gap:.45rem}
.pb-label{font-size:.53rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.play-btn{
  display:flex;align-items:center;gap:.45rem;padding:.4rem .85rem;
  background:transparent;border:1px solid var(--border-hi);color:var(--text);
  font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;
  cursor:pointer;transition:border-color .2s,color .2s,background .2s;
}
.play-btn:hover{border-color:var(--accent);color:var(--accent)}
.play-btn.active{border-color:var(--accent2);color:var(--accent2);background:rgba(126,107,176,.08)}
.play-btn:disabled{opacity:.3;cursor:not-allowed}
.play-btn svg{width:9px;height:9px;flex-shrink:0}
.stop-btn{
  display:flex;align-items:center;justify-content:center;width:26px;height:26px;
  background:transparent;border:1px solid var(--border-hi);color:var(--muted);
  cursor:pointer;transition:border-color .2s,color .2s;
}
.stop-btn:hover{border-color:var(--danger);color:var(--danger)}
.divider{width:1px;height:18px;background:var(--border);flex-shrink:0}
.vol-wrap{display:flex;align-items:center;gap:.4rem}
.vol-slider{-webkit-appearance:none;appearance:none;width:65px;height:2px;background:var(--border-hi);outline:none;cursor:pointer}
.vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:9px;height:9px;border-radius:50%;background:var(--accent);cursor:pointer}
.scrub-wrap{flex:1;min-width:100px;display:flex;align-items:center;gap:.5rem}
.scrub-slider{flex:1;-webkit-appearance:none;appearance:none;height:2px;background:var(--border-hi);outline:none;cursor:pointer}
.scrub-slider::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:var(--accent2);cursor:pointer}
.time-disp{font-size:.56rem;color:var(--muted);white-space:nowrap;min-width:58px;text-align:right}

/* ROLL CANVAS */
.roll-canvas-wrap{display:flex;position:relative;overflow:hidden}
#key-canvas{flex-shrink:0;display:block}
.roll-scroll{flex:1;overflow-x:auto;overflow-y:hidden;position:relative;cursor:grab}
.roll-scroll:active{cursor:grabbing}
#roll-canvas{display:block}
#playhead{position:absolute;top:0;bottom:0;width:2px;background:var(--accent);pointer-events:none;display:none;box-shadow:0 0 8px rgba(200,169,110,.6)}

/* FOOTER */
.roll-footer{display:flex;align-items:center;justify-content:space-between;padding:.8rem 1.5rem;border-top:1px solid var(--border);flex-wrap:wrap;gap:.7rem}
.result-meta-txt{font-size:.58rem;color:var(--muted);letter-spacing:.05em}
#download-btn{display:inline-flex;align-items:center;gap:.45rem;padding:.5rem 1.2rem;background:transparent;border:1px solid var(--success);color:var(--success);font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:background .2s}
#download-btn:hover{background:rgba(107,170,138,.1)}

.roll-scroll::-webkit-scrollbar{height:3px}
.roll-scroll::-webkit-scrollbar-track{background:var(--surface2)}
.roll-scroll::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}
</style>
</head>
<body>
<div class="wrap">

<!-- HEADER -->
<header>
  <span class="logo-mark">♩</span>
  <div class="logo-sub">
    <span class="logo-title">Piano → MIDI Transcription</span>
    <span class="tagline">// Magenta OnsetsAndFrames · Piano Roll · Synth Playback</span>
  </div>
</header>

<!-- UPLOAD CARD -->
<div class="card">
  <div class="top-grid">
    <div id="drop-zone">
      <input type="file" id="file-input" accept=".mp3,.wav,audio/mpeg,audio/wav">
      <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <path d="M9 19V6l12-3v13M9 19c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2zm12 0c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2z"/>
      </svg>
      <p class="drop-label"><strong>Dosya seç</strong> veya buraya bırak</p>
      <p class="drop-formats">MP3 · WAV — maks 50 MB</p>
    </div>
    <div style="display:flex;flex-direction:column;gap:.7rem">
      <div class="file-meta-box" id="file-meta">
        <div class="file-row">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M9 19V6l12-3v13M9 19c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2zm12 0c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2z"/>
          </svg>
          <span class="fname" id="fname-txt">—</span>
          <span class="fsize" id="fsize-txt">—</span>
        </div>
        <div style="height:1px;background:var(--border)"></div>
        <div style="font-size:.57rem;color:var(--muted);line-height:1.9;letter-spacing:.04em">
          Dosya hazır.<br>Dönüştür butonuna basın.
        </div>
      </div>
      <button id="convert-btn">▶ Dönüştür</button>
    </div>
  </div>
  <div id="status-panel">
    <div class="status-hdr">
      <div class="spinner"></div>
      <span class="status-lbl" id="status-lbl">İşleniyor…</span>
    </div>
    <div class="prog-track">
      <div class="prog-fill" id="prog-fill"></div>
      <div class="prog-shimmer"></div>
    </div>
    <div id="stage-log"></div>
  </div>
  <div id="error-panel"></div>
</div>

<!-- PIANO ROLL SECTION -->
<div id="roll-section">
  <div class="roll-header">
    <span class="roll-title">Piano Roll — Tespit Edilen Notalar</span>
    <div class="roll-stats">
      <div class="stat"><span class="stat-val" id="stat-notes">—</span><span class="stat-key">Nota</span></div>
      <div class="stat"><span class="stat-val" id="stat-dur">—</span><span class="stat-key">Süre</span></div>
      <div class="stat"><span class="stat-val" id="stat-range">—</span><span class="stat-key">Aralık</span></div>
    </div>
  </div>

  <div class="playback-bar">
    <!-- Orijinal -->
    <div class="pb-group">
      <span class="pb-label">Orijinal</span>
      <button class="play-btn" id="orig-play-btn" disabled>
        <svg viewBox="0 0 10 10" fill="currentColor"><polygon points="2,1 9,5 2,9"/></svg>
        Oynat
      </button>
    </div>
    <div class="divider"></div>
    <!-- MIDI Synth -->
    <div class="pb-group">
      <span class="pb-label">MIDI Synth</span>
      <button class="play-btn" id="midi-play-btn">
        <svg viewBox="0 0 10 10" fill="currentColor"><polygon points="2,1 9,5 2,9"/></svg>
        Oynat
      </button>
    </div>
    <!-- Stop -->
    <button class="stop-btn" id="stop-btn" title="Durdur">
      <svg width="7" height="7" viewBox="0 0 7 7" fill="currentColor"><rect width="7" height="7"/></svg>
    </button>
    <div style="flex:1"></div>
    <!-- Volume -->
    <div class="vol-wrap">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="1.5">
        <path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.54 8.46a5 5 0 010 7.07"/>
      </svg>
      <input class="vol-slider" type="range" id="vol-slider" min="0" max="1" step=".02" value=".75">
    </div>
    <!-- Scrubber -->
    <div class="scrub-wrap">
      <input class="scrub-slider" type="range" id="scrub-slider" min="0" max="100" step=".1" value="0">
      <span class="time-disp" id="time-disp">0:00 / 0:00</span>
    </div>
  </div>

  <!-- Canvas area -->
  <div class="roll-canvas-wrap" id="roll-canvas-wrap" style="height:220px">
    <canvas id="key-canvas" width="38" height="220"></canvas>
    <div class="roll-scroll" id="roll-scroll">
      <canvas id="roll-canvas"></canvas>
      <div id="playhead"></div>
    </div>
  </div>

  <div class="roll-footer">
    <span class="result-meta-txt" id="result-meta-txt">—</span>
    <a id="download-btn" href="#" download>
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
      </svg>
      .mid İndir
    </a>
  </div>
</div>

</div><!-- /wrap -->

<!-- Deps -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/tensorflow/1.2.8/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@magenta/music@^1.0.0/es6/core.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@magenta/music@^1.0.0/es6/transcription.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>

<script>
'use strict';
/* ═══════════════════════════════
   CONSTANTS & UTILS
═══════════════════════════════ */
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const ROLL_H     = 220;
const PX_PER_SEC = 110;

function midiToName(m){ return NOTE_NAMES[m%12] + Math.floor(m/12-1); }
function fmtTime(s){
  s = Math.max(0,s);
  return Math.floor(s/60)+':'+(Math.floor(s%60)+'').padStart(2,'0');
}
function fmtSize(b){
  if(b<1024) return b+' B';
  if(b<1048576) return (b/1024).toFixed(1)+' KB';
  return (b/1048576).toFixed(1)+' MB';
}

/* ═══════════════════════════════
   STATE
═══════════════════════════════ */
let selectedFile  = null;
let noteSeq       = null;
let midiBytes     = null;
let origAudioBuf  = null;
let audioCtx      = null;
let origSrcNode   = null;
let gainNode      = null;
let synthPlaying  = false;
let synthParts    = [];
let playStartReal = 0;   // performance.now()/1000 when playback began
let playOffset    = 0;   // seconds offset when playback began
let totalDur      = 0;
let rafId         = null;
let rollMinPitch  = 21;
let rollMaxPitch  = 108;
let rollPitchRange= 88;
let rowH          = 0;
let rollWidth     = 0;
let synth         = null;

/* ═══════════════════════════════
   DOM
═══════════════════════════════ */
const $ = id => document.getElementById(id);
const dropZone    = $('drop-zone');
const fileInput   = $('file-input');
const fileMeta    = $('file-meta');
const fnameTxt    = $('fname-txt');
const fsizeTxt    = $('fsize-txt');
const convertBtn  = $('convert-btn');
const statusPanel = $('status-panel');
const statusLbl   = $('status-lbl');
const progFill    = $('prog-fill');
const stageLog    = $('stage-log');
const errorPanel  = $('error-panel');
const rollSection = $('roll-section');
const statNotes   = $('stat-notes');
const statDur     = $('stat-dur');
const statRange   = $('stat-range');
const origPlayBtn = $('orig-play-btn');
const midiPlayBtn = $('midi-play-btn');
const stopBtn     = $('stop-btn');
const volSlider   = $('vol-slider');
const scrubSlider = $('scrub-slider');
const timeDisp    = $('time-disp');
const rollCanvas  = $('roll-canvas');
const keyCanvas   = $('key-canvas');
const rollScroll  = $('roll-scroll');
const playhead    = $('playhead');
const resultMeta  = $('result-meta-txt');
const downloadBtn = $('download-btn');

/* ═══════════════════════════════
   STATUS HELPERS
═══════════════════════════════ */
function setProg(p){ progFill.style.width = p+'%'; }
function addStage(text, state='active'){
  const el = document.createElement('div');
  el.className = 'se';
  el.innerHTML = `<div class="sdot"></div><span>${text}</span>`;
  stageLog.appendChild(el);
  requestAnimationFrame(()=> el.classList.add('vis', state));
  return el;
}
function doneStage(el){ el.classList.remove('active'); el.classList.add('done'); }
function hideStatus(){ statusPanel.style.display='none'; errorPanel.style.display='none'; }
function showError(msg){
  hideStatus();
  errorPanel.style.display='block';
  errorPanel.textContent='⚠ '+msg;
  convertBtn.disabled=false;
  convertBtn.textContent='▶ Tekrar Dene';
}

/* ═══════════════════════════════
   FILE SELECTION
═══════════════════════════════ */
function onFile(file){
  if(!file) return;
  if(!/\.(mp3|wav)$/i.test(file.name) && !file.type.startsWith('audio/')){
    showError('Lütfen MP3 veya WAV dosyası seçin.'); return;
  }
  if(file.size > 50*1024*1024){ showError('Dosya 50 MB\'ı geçemez.'); return; }
  selectedFile=file; midiBytes=null; noteSeq=null;
  fnameTxt.textContent=file.name;
  fsizeTxt.textContent=fmtSize(file.size);
  fileMeta.style.display='flex';
  convertBtn.style.display='block';
  convertBtn.disabled=false;
  convertBtn.textContent='▶ Dönüştür';
  hideStatus();
  rollSection.style.display='none';
}
fileInput.addEventListener('change', e=> onFile(e.target.files[0]));
dropZone.addEventListener('dragover', e=>{ e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', ()=> dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e=>{ e.preventDefault(); dropZone.classList.remove('drag-over'); onFile(e.dataTransfer.files[0]); });

/* ═══════════════════════════════
   CONVERSION PIPELINE
═══════════════════════════════ */
convertBtn.addEventListener('click', async ()=>{
  if(!selectedFile) return;
  await runConvert(selectedFile);
});

async function runConvert(file){
  convertBtn.disabled=true;
  convertBtn.textContent='İşleniyor…';
  hideStatus();
  stageLog.innerHTML='';
  statusPanel.style.display='block';
  setProg(0);

  /* Stage 1 – Model */
  const s1 = addStage('Model yükleniyor (OnsetsAndFrames)…');
  setProg(8);
  let transcriber;
  try {
    if(typeof window.transcription==='undefined' || !window.transcription.OnsetsAndFrames)
      throw new Error('Magenta transcription bundle bulunamadı. Sayfayı yenileyin (Ctrl+Shift+R).');
    const CKPT='https://storage.googleapis.com/magentadata/js/checkpoints/transcription/onsets_frames_uni';
    transcriber = new window.transcription.OnsetsAndFrames(CKPT);
    statusLbl.textContent='Model indiriliyor… (~80 MB, ilk açılışta)';
    await transcriber.initialize();
    doneStage(s1); setProg(32);
  } catch(e){ showError('Model: '+e.message); return; }

  /* Stage 2 – Decode audio */
  const s2 = addStage('Ses dosyası çözümleniyor…');
  statusLbl.textContent='Ses okunuyor…'; setProg(44);
  try {
    const buf = await file.arrayBuffer();
    audioCtx = new (window.AudioContext||window.webkitAudioContext)({sampleRate:16000});
    origAudioBuf = await audioCtx.decodeAudioData(buf);
    doneStage(s2); setProg(58);
  } catch(e){ showError('Ses okunamadı: '+e.message); return; }

  /* Stage 3 – Transcribe */
  const s3 = addStage('Piyano notaları analiz ediliyor…');
  statusLbl.textContent='Transkripsiyon çalışıyor…'; setProg(68);
  let seq;
  try {
    seq = await transcriber.transcribeFromAudioBuffer(origAudioBuf);
    doneStage(s3); setProg(88);
  } catch(e){ showError('Transkripsiyon: '+e.message); return; }

  /* Stage 4 – MIDI encode */
  const s4 = addStage('MIDI oluşturuluyor…');
  statusLbl.textContent='MIDI encode…'; setProg(96);
  let midi;
  try {
    midi = window.core.sequenceProtoToMidi(seq);
    doneStage(s4); setProg(100);
  } catch(e){ showError('MIDI encode: '+e.message); return; }

  noteSeq   = seq;
  midiBytes = midi;
  totalDur  = seq.totalTime || 0;

  setTimeout(()=>{
    statusPanel.style.display='none';
    convertBtn.style.display='none';
    showResults(file, seq, midi);
  }, 300);
}

/* ═══════════════════════════════
   RESULTS & PIANO ROLL
═══════════════════════════════ */
function showResults(file, seq, midi){
  const notes   = seq.notes||[];
  const pitches = notes.map(n=>n.pitch);
  const minP    = Math.min(...pitches);
  const maxP    = Math.max(...pitches);

  statNotes.textContent = notes.length;
  statDur.textContent   = fmtTime(totalDur);
  statRange.textContent = midiToName(minP)+'–'+midiToName(maxP);

  resultMeta.textContent = `${notes.length} nota · ${totalDur.toFixed(1)}s · ${fmtSize(midi.byteLength)}`;
  const blob = new Blob([midi],{type:'audio/midi'});
  downloadBtn.href = URL.createObjectURL(blob);
  downloadBtn.download = file.name.replace(/\.[^.]+$/,'')+'.mid';

  scrubSlider.max   = totalDur;
  scrubSlider.value = 0;
  timeDisp.textContent = fmtTime(0)+' / '+fmtTime(totalDur);
  origPlayBtn.disabled = false;

  rollSection.style.display = 'block';
  requestAnimationFrame(()=> drawRoll(seq, minP, maxP));
}

/* ═══════════════════════════════
   PIANO ROLL RENDERER
═══════════════════════════════ */
function drawRoll(seq, minP, maxP){
  const notes = seq.notes||[];
  const dur   = seq.totalTime||1;
  const PAD   = 3;

  rollMinPitch   = Math.max(0,  minP-PAD);
  rollMaxPitch   = Math.min(127,maxP+PAD);
  rollPitchRange = rollMaxPitch - rollMinPitch + 1;
  rowH           = ROLL_H / rollPitchRange;
  rollWidth      = Math.max(rollScroll.clientWidth, Math.ceil(dur * PX_PER_SEC));

  /* ── Key labels ── */
  keyCanvas.height = ROLL_H;
  const kc = keyCanvas.getContext('2d');
  kc.fillStyle='#16161c';
  kc.fillRect(0,0,38,ROLL_H);

  for(let p=rollMinPitch; p<=rollMaxPitch; p++){
    const y    = pY(p);
    const name = NOTE_NAMES[p%12];
    const blk  = name.includes('#');
    kc.fillStyle = blk ? '#0e0e12':'#16161c';
    kc.fillRect(0,y,38,rowH);
    if(name==='C'){
      kc.fillStyle='rgba(200,169,110,.16)';
      kc.fillRect(0,y,38,rowH);
      kc.fillStyle='#c8a96e';
      kc.font='500 6.5px "DM Mono",monospace';
      kc.fillText(midiToName(p),3,y+rowH-2);
    }
    kc.strokeStyle='rgba(30,30,38,.9)';
    kc.lineWidth=.5;
    kc.beginPath(); kc.moveTo(0,y); kc.lineTo(38,y); kc.stroke();
  }
  kc.strokeStyle='#2e2e3e'; kc.lineWidth=1;
  kc.beginPath(); kc.moveTo(37,0); kc.lineTo(37,ROLL_H); kc.stroke();

  /* ── Roll canvas ── */
  rollCanvas.width  = rollWidth;
  rollCanvas.height = ROLL_H;
  const rc = rollCanvas.getContext('2d');

  // row backgrounds
  for(let p=rollMinPitch; p<=rollMaxPitch; p++){
    const blk  = NOTE_NAMES[p%12].includes('#');
    const y    = pY(p);
    rc.fillStyle = blk ? 'rgba(0,0,0,.3)':'rgba(255,255,255,.015)';
    rc.fillRect(0,y,rollWidth,rowH);
  }

  // beat grid
  for(let t=0; t<=Math.ceil(dur); t++){
    const x = t*PX_PER_SEC;
    rc.strokeStyle = t%4===0 ? 'rgba(200,169,110,.13)':'rgba(255,255,255,.04)';
    rc.lineWidth   = t%4===0 ? .9:.4;
    rc.beginPath(); rc.moveTo(x,0); rc.lineTo(x,ROLL_H); rc.stroke();
    // beat label
    if(t%4===0 && t>0){
      rc.fillStyle='rgba(200,169,110,.3)';
      rc.font='6px "DM Mono",monospace';
      rc.fillText(fmtTime(t),x+2,8);
    }
  }

  // notes
  notes.forEach(n=>{
    const x   = n.startTime * PX_PER_SEC;
    const w   = Math.max(2,(n.endTime-n.startTime)*PX_PER_SEC - 1);
    const y   = pY(n.pitch);
    const h   = Math.max(2, rowH - 1);
    const vel = (n.velocity||80)/127;
    const blk = NOTE_NAMES[n.pitch%12].includes('#');
    const a   = .5 + vel*.5;

    const g = rc.createLinearGradient(x,y,x,y+h);
    if(blk){
      g.addColorStop(0,`rgba(155,130,210,${a})`);
      g.addColorStop(1,`rgba(100,82,150,${a*.65})`);
    } else {
      g.addColorStop(0,`rgba(210,178,110,${a})`);
      g.addColorStop(1,`rgba(150,115,60,${a*.65})`);
    }
    rc.fillStyle = g;
    rc.fillRect(x, y+1, w, h);
    // highlight
    rc.fillStyle = blk ? `rgba(200,180,255,${a*.35})`:`rgba(255,240,190,${a*.35})`;
    rc.fillRect(x, y+1, w, 2);
  });

  // show playhead
  playhead.style.display='block';
  setPlayheadX(0);
}

function pY(pitch){ return (rollMaxPitch - pitch) * rowH; }

function setPlayheadX(t){
  const x = t * PX_PER_SEC;
  playhead.style.left = x+'px';
  // auto-scroll
  const vw = rollScroll.clientWidth;
  if(x > rollScroll.scrollLeft + vw - 80)
    rollScroll.scrollLeft = x - 80;
}

/* ═══════════════════════════════
   PLAYBACK — ORIGINAL
═══════════════════════════════ */
function playIconHTML(){ return '<svg viewBox="0 0 10 10" fill="currentColor"><polygon points="2,1 9,5 2,9"/></svg>'; }
function pauseIconHTML(){ return '<svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="2" x2="3" y2="8"/><line x1="7" y1="2" x2="7" y2="8"/></svg>'; }

function stopAll(){
  if(origSrcNode){ try{origSrcNode.stop();}catch(e){} origSrcNode=null; }
  stopSynth();
  cancelAnimationFrame(rafId);
  synthPlaying=false;
  origPlayBtn.classList.remove('active');
  origPlayBtn.innerHTML = playIconHTML()+' Oynat';
  midiPlayBtn.classList.remove('active');
  midiPlayBtn.innerHTML = playIconHTML()+' Oynat';
}

origPlayBtn.addEventListener('click', async ()=>{
  if(!origAudioBuf) return;
  stopAll();
  playOffset = parseFloat(scrubSlider.value)||0;
  if(audioCtx.state==='suspended') await audioCtx.resume();

  origSrcNode = audioCtx.createBufferSource();
  origSrcNode.buffer = origAudioBuf;
  gainNode = audioCtx.createGain();
  gainNode.gain.value = parseFloat(volSlider.value);
  origSrcNode.connect(gainNode);
  gainNode.connect(audioCtx.destination);
  origSrcNode.start(0, playOffset);
  playStartReal = performance.now()/1000;

  origSrcNode.onended = ()=>{
    if(!origSrcNode) return;
    origSrcNode=null;
    origPlayBtn.classList.remove('active');
    origPlayBtn.innerHTML = playIconHTML()+' Oynat';
    cancelAnimationFrame(rafId);
  };

  origPlayBtn.classList.add('active');
  origPlayBtn.innerHTML = pauseIconHTML()+' Çalıyor';
  startRAF('orig');
});

volSlider.addEventListener('input', ()=>{
  const v = parseFloat(volSlider.value);
  if(gainNode) gainNode.gain.value = v;
  if(synth) synth.volume.value = Tone.gainToDb(v);
});

/* ═══════════════════════════════
   PLAYBACK — MIDI SYNTH
═══════════════════════════════ */
function getSynth(){
  if(synth) return synth;
  synth = new Tone.PolySynth(Tone.Synth,{
    oscillator:{type:'triangle'},
    envelope:{attack:.01,decay:.08,sustain:.55,release:.7},
    volume:-8
  }).toDestination();
  return synth;
}

function stopSynth(){
  Tone.Transport.stop();
  Tone.Transport.cancel();
  synthParts.forEach(p=>{ try{p.dispose();}catch(e){} });
  synthParts=[];
  if(synth){ try{synth.releaseAll();}catch(e){} }
}

midiPlayBtn.addEventListener('click', async ()=>{
  if(!noteSeq) return;
  stopAll();
  await Tone.start();
  playOffset    = parseFloat(scrubSlider.value)||0;
  playStartReal = performance.now()/1000;

  const s = getSynth();
  s.volume.value = Tone.gainToDb(parseFloat(volSlider.value));

  const noteEvents = (noteSeq.notes||[])
    .filter(n=> n.startTime >= playOffset)
    .map(n=>({
      time:     n.startTime - playOffset,
      pitch:    n.pitch,
      duration: Math.max(.04, n.endTime - n.startTime),
      velocity: (n.velocity||80)/127
    }));

  const part = new Tone.Part((time,ev)=>{
    s.triggerAttackRelease(
      Tone.Frequency(ev.pitch,'midi').toNote(),
      ev.duration, time, ev.velocity
    );
  }, noteEvents);
  part.start(0);
  synthParts=[part];

  Tone.Transport.start();
  synthPlaying=true;

  const remaining = totalDur - playOffset;
  setTimeout(()=>{
    if(!synthPlaying) return;
    stopSynth(); synthPlaying=false;
    midiPlayBtn.classList.remove('active');
    midiPlayBtn.innerHTML = playIconHTML()+' Oynat';
    cancelAnimationFrame(rafId);
  }, remaining*1000 + 800);

  midiPlayBtn.classList.add('active');
  midiPlayBtn.innerHTML = pauseIconHTML()+' Çalıyor';
  startRAF('synth');
});

stopBtn.addEventListener('click', stopAll);

/* ═══════════════════════════════
   RAF LOOP
═══════════════════════════════ */
function startRAF(src){
  cancelAnimationFrame(rafId);
  function tick(){
    const elapsed = Math.min(playOffset + (performance.now()/1000 - playStartReal), totalDur);
    setPlayheadX(elapsed);
    scrubSlider.value = elapsed;
    timeDisp.textContent = fmtTime(elapsed)+' / '+fmtTime(totalDur);
    if(elapsed < totalDur) rafId = requestAnimationFrame(tick);
  }
  rafId = requestAnimationFrame(tick);
}

/* scrubber */
scrubSlider.addEventListener('input', ()=>{
  const t = parseFloat(scrubSlider.value);
  setPlayheadX(t);
  timeDisp.textContent = fmtTime(t)+' / '+fmtTime(totalDur);
});
scrubSlider.addEventListener('change', ()=>{
  playOffset = parseFloat(scrubSlider.value);
  if(origSrcNode)   origPlayBtn.click();
  else if(synthPlaying) midiPlayBtn.click();
});
</script>
